<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Birthday Party Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffe6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #ff4d94;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 6px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #ff4d94;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #ff1a75;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Birthday Party Registration</h2>

    <form>

        <label>Full Name</label>
        <input type="text" required>

        <label>Birthday Age</label>
        <input type="number" required>

        <label>Party Date</label>
        <input type="date" required>

        <label>Phone Number</label>
        <input type="tel" pattern="[0-9]{10}" placeholder="10-digit number" required>

        <label>Email</label>
        <input type="email" required>

        <label>Party Type</label>
        <select required>
            <option value="">--Select--</option>
            <option>Kids Party</option>
            <option>Teen Party</option>
            <option>Adult Party</option>
        </select>

        <label>Special Request</label>
        <textarea rows="3"></textarea>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
